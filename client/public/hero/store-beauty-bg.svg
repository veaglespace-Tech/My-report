      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0A1020"/>
      <stop offset="1" stop-color="#050A14"/>
    </linearGradient>
    <radialGradient id="r1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(520 320) rotate(55) scale(960 720)">
