spring.application.name=myreport-server
spring.config.import=optional:file:.env[.properties],optional:file:server/.env[.properties]
server.port=8082

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/myreport_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.continue-on-error=${SQL_INIT_CONTINUE_ON_ERROR:false}
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

app.jwt.secret=${JWT_SECRET:MyReportLocalJwtSecretKeyForDevelopmentOnlyChangeBeforeProduction1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.remember-expiration-ms=${JWT_REMEMBER_EXPIRATION_MS:604800000}
app.super-admin.email=${SUPER_ADMIN_EMAIL:ankitapatil00001@gmail.com}
app.super-admin.password=${SUPER_ADMIN_PASSWORD:ChangeMe@12345}
app.frontend-origin=${FRONTEND_URL:${FRONTEND_ORIGIN:http://localhost:3000,http://localhost:5173}}
app.backend-origin=${BACKEND_URL:http://localhost:8082}

# Razorpay (configure via environment variables; defaults empty)
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# PayU (configure via environment variables; defaults use PayU test credentials)
payu.merchant-key=${PAYU_MERCHANT_KEY:GKJE3Z}
payu.merchant-salt=${PAYU_MERCHANT_SALT:0zqiCnB4GslxAanSxjEAutWkWuggFiGs}
payu.base-url=${PAYU_BASE_URL:https://test.payu.in/_payment}

# Optional app email (configure via environment variable)
app.email=${SMTP_FROM:${SMTP_USER:myreport@info.veaglespace.com}}
app.email.from-name=${SMTP_FROM_NAME:MyReport}

# SMTP mail configuration
spring.mail.host=${SMTP_HOST:smtp.hostinger.com}
spring.mail.port=${SMTP_PORT:465}
spring.mail.username=${SMTP_USER:myreport@info.veaglespace.com}
spring.mail.password=${SMTP_PASS:MyReport@123456}
spring.mail.properties.mail.smtp.from=${SMTP_ENVELOPE_FROM:${SMTP_FROM:${SMTP_USER:myreport@info.veaglespace.com}}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
