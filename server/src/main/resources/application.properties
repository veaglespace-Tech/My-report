spring.config.import=optional:file:.env[.properties],optional:file:server/.env[.properties]
spring.application.name=${SPRING_APPLICATION_NAME:myreport-server}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:file:./target/myreport-local-db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}


spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=${FLYWAY_BASELINE_VERSION:0}
spring.flyway.validate-on-migrate=${FLYWAY_VALIDATE_ON_MIGRATE:true}

app.jwt.secret=${JWT_SECRET:MyReportLocalJwtSecretKeyForDevelopmentOnly1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.remember-expiration-ms=${JWT_REMEMBER_EXPIRATION_MS:604800000}
app.super-admin.email=${SUPER_ADMIN_EMAIL:ankitapatil00001@gmail.com}
app.super-admin.password=${SUPER_ADMIN_PASSWORD:Ankita@12345}
app.frontend-origin=${FRONTEND_ORIGIN:http://localhost:3004}
app.backend-origin=${BACKEND_URL:http://localhost:8080}

razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

payu.merchant-key=${PAYU_MERCHANT_KEY:}
payu.merchant-salt=${PAYU_MERCHANT_SALT:}
payu.base-url=${PAYU_BASE_URL:https://secure.payu.in/_payment}

app.email=${SMTP_FROM:noreply@myreport.local}
app.email.from-name=${SMTP_FROM_NAME:MyReport}

spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:2525}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.from=${SMTP_ENVELOPE_FROM:noreply@myreport.local}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:false}
