spring.config.import=optional:file:.env[.properties],optional:file:server/.env[.properties]
spring.application.name=${SPRING_APPLICATION_NAME}
server.port=${SERVER_PORT}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL}

spring.sql.init.mode=${SQL_INIT_MODE}
spring.sql.init.continue-on-error=${SQL_INIT_CONTINUE_ON_ERROR}
spring.sql.init.schema-locations=${SQL_INIT_SCHEMA_LOCATIONS}
spring.jpa.defer-datasource-initialization=${JPA_DEFER_DATASOURCE_INITIALIZATION}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}
app.jwt.remember-expiration-ms=${JWT_REMEMBER_EXPIRATION_MS}
app.super-admin.email=${SUPER_ADMIN_EMAIL}
app.super-admin.password=${SUPER_ADMIN_PASSWORD}
app.frontend-origin=${FRONTEND_ORIGIN}
app.backend-origin=${BACKEND_URL}

razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

payu.merchant-key=${PAYU_MERCHANT_KEY}
payu.merchant-salt=${PAYU_MERCHANT_SALT}
payu.base-url=${PAYU_BASE_URL}

app.email=${SMTP_FROM}
app.email.from-name=${SMTP_FROM_NAME}

spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.from=${SMTP_ENVELOPE_FROM}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH}
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL_ENABLE}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE}
