name: Deploy MyReport

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true

          script: |
            set -e

            cd ~/My-report

            git fetch origin main
            git reset --hard origin/main

            # Frontend
            cd client
            npm ci || npm install
            rm -rf .next .next-build
            npm run build
            pm2 restart myreport-client || pm2 start npm --name myreport-client -- start

            # Backend
            cd ../server
            chmod +x ./mvnw
            ./mvnw clean package -DskipTests
            pm2 restart myreport-server || pm2 start "java -jar target/backend-0.0.1-SNAPSHOT.jar" --name myreport-server
            pm2 save
